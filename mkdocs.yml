site_name: MealHubApi Documentation
site_description: Reference and feature documentation for the MealHubApi Laravel REST API.
repo_url: https://github.com/anuplaravel-crypto/mealhubapi
repo_name: anuplaravel-crypto/mealhubapi
docs_dir: docs
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite

plugins:
  - search

nav:
  - Home: README.md

  - Project:
      - Roadmap: roadmap.md
      - Architecture & Conventions: conventions.md

  # Auto-generated by `php artisan docs:generate` — do not hand-edit these pages.
  - Development:
      - Architecture: architecture.md
      - Controllers: controllers.md
      - Models: models.md
      - Routes: routes.md

  - Features:
      - API Conventions: features/api-conventions.md
      - Authentication: features/authentication.md
      - Locations: features/locations.md
      - Home CMS: features/home-cms.md
      - Media Uploads: features/media-uploads.md
      - Profile: features/profile.md
      - Notifications: features/notifications.md
      - Newsletter: features/newsletter.md
      - Rider Onboarding: features/rider-onboarding.md

  - Testing:
      - Postman Testing: postman-testing.md
